# Optional HTML-site view over the Markdown. The Markdown files are the source
# of truth; this only renders them. Ignore this file entirely if you only want
# to browse on GitHub / in an editor.
#
#   pip install mkdocs-material
#   mkdocs serve      # preview at http://127.0.0.1:8000
#   mkdocs gh-deploy  # publish to GitHub Pages
#
# `docs_dir: .` lets MkDocs render the repo in place without duplicating files.

site_name: Cody's Toolbox
site_description: Personal, product-agnostic toolbox of reusable dev assets.
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
docs_dir: .
exclude_docs: |
  node_modules
  site
  .github
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
nav:
  - Home: README.md
  - Taxonomy: ARTIFACTS.md
  - References: references/README.md
  - Snippets: snippets/README.md
  - Configs: configs/README.md
  - Prompts: prompts/README.md
  - Checklists: checklists/README.md
  - Playbooks: playbooks/README.md
  - Scripts: scripts/README.md
